<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darts Merge Creator 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2canvas for image exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            user-select: none;
        }
        .grid-cell {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .grid-cell:active {
            transform: scale(0.95);
        }
        .tool-btn {
            transition: all 0.2s;
        }
        .tool-btn.active {
            ring: 4px;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            z-index: 10;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Global Toast Notification -->
    <div id="toast-message" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 border-2 border-slate-600 text-white px-6 py-3 rounded-xl shadow-2xl z-[100] transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none font-bold text-center flex items-center gap-2">
        <i class="ph ph-info text-xl text-cyan-400"></i>
        <span id="toast-text"></span>
    </div>

    <!-- Image Export Modal -->
    <div id="image-modal" class="fixed inset-0 bg-slate-950/90 z-[100] hidden flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-4xl w-full">
            <h3 class="text-white text-2xl font-bold mb-2">Your Grid is Ready!</h3>
            <p class="text-amber-400 mb-6 text-center font-medium bg-amber-400/10 px-4 py-2 rounded-lg">
                <i class="ph ph-download-simple"></i> Right-click (or long-press) the image below and select "Save Image As..."
            </p>
            <div class="overflow-auto max-h-[60vh] w-full flex justify-center rounded-xl border-4 border-slate-700 bg-slate-800 p-2 shadow-inner">
                <img id="exported-image" class="max-w-full h-auto object-contain" alt="Exported Level">
            </div>
            <button onclick="closeImageModal()" class="mt-6 bg-rose-600 hover:bg-rose-500 px-8 py-2.5 rounded-xl font-bold text-white transition-colors shadow-lg shadow-rose-600/20">Close</button>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-700 py-4 px-6 shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                Darts Merge Creator 2
            </h1>
            <p class="text-slate-400 text-sm mt-1">Design your ultimate merge board</p>
        </div>

        <div class="flex flex-wrap items-center gap-4 bg-slate-800 p-3 rounded-xl border border-slate-700">
            <div class="flex items-center gap-2">
                <label for="cols" class="text-sm text-slate-300 font-medium">Cols:</label>
                <input type="number" id="cols" min="4" max="15" value="6" oninput="handleDimensionChange('cols')" class="w-16 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white focus:outline-none focus:border-cyan-500">
            </div>
            
            <button onclick="toggleRatioLock()" id="ratio-lock-btn" class="text-slate-400 hover:text-white transition-colors p-1" title="Lock A4 Ratio">
                <i id="ratio-lock-icon" class="ph ph-lock-key-open text-xl"></i>
            </button>

            <div class="flex items-center gap-2">
                <label for="rows" class="text-sm text-slate-300 font-medium">Rows:</label>
                <input type="number" id="rows" min="4" max="22" value="8" oninput="handleDimensionChange('rows')" class="w-16 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white focus:outline-none focus:border-cyan-500">
            </div>
            
            <button onclick="generateGrid()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-1.5 rounded-lg font-semibold transition-colors flex items-center gap-2 shadow-lg shadow-cyan-500/20">
                <i class="ph ph-arrows-clockwise text-lg"></i> Rebuild
            </button>
            <button onclick="clearGrid()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-1.5 rounded-lg font-semibold transition-colors flex items-center gap-2 shadow-lg shadow-red-500/20">
                <i class="ph ph-trash text-lg"></i> Clear
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Grid Workspace Area -->
        <div class="flex-1 p-6 flex flex-col items-center justify-start overflow-auto bg-slate-950/50">
            <div id="capture-area" class="bg-slate-800 p-4 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-fit mx-auto">
                <div id="grid-container" class="grid gap-1.5 mx-auto">
                    <!-- Grid cells will be injected here via JS -->
                </div>
            </div>
            
            <div class="mt-8 flex flex-col items-center w-full max-w-xl">
                <!-- Entrance Song Setup -->
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-3">Entrance Song Setup</h3>
                <div class="flex flex-col sm:flex-row w-full gap-3 mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700 items-center">
                    <input type="text" id="audio-url" placeholder="Paste Audio Link (.mp3, .wav)" class="flex-1 w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <span class="text-xs text-slate-500 font-bold uppercase px-2">OR</span>
                        <input type="file" id="audio-upload" accept="audio/*" class="w-48 text-sm text-slate-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-amber-600 file:text-white hover:file:bg-amber-500 cursor-pointer">
                    </div>
                    <button onclick="submitAudio()" class="w-full sm:w-auto bg-amber-600 hover:bg-amber-500 text-white px-5 py-2 rounded-lg font-bold transition-colors shadow-lg shadow-amber-600/20 whitespace-nowrap flex items-center justify-center gap-2">
                        <i class="ph ph-check-circle text-lg"></i> Submit
                    </button>
                </div>

                <!-- Export Options -->
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-3">Share Level</h3>
                <div class="flex flex-wrap justify-center gap-3">
                    <button onclick="exportImage()" class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2.5 rounded-lg font-medium transition flex items-center gap-2 shadow-lg shadow-indigo-600/20">
                        <i class="ph ph-image text-xl"></i> Save Photo
                    </button>
                    <button onclick="copyShareLink()" class="bg-teal-600 hover:bg-teal-500 px-5 py-2.5 rounded-lg font-medium transition flex items-center gap-2 shadow-lg shadow-teal-600/20">
                        <i class="ph ph-link text-xl"></i> Copy Share Link
                    </button>
                </div>
                <textarea id="fallback-box" class="mt-4 w-full h-24 bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs font-mono text-slate-400 hidden" readonly></textarea>
            </div>
        </div>

        <!-- Palettes Area -->
        <div class="w-full lg:w-96 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-700 flex flex-col h-full lg:h-auto overflow-y-auto">
            
            <!-- Mode Toggle -->
            <div class="p-4 border-b border-slate-700 flex gap-2 bg-slate-800">
                <button onclick="setMode('build')" id="mode-build" class="flex-1 bg-cyan-600 text-white py-2 rounded-lg font-bold shadow-[inset_0_0_10px_rgba(255,255,255,0.2)] transition-colors">Build Mode</button>
                <button onclick="setMode('play')" id="mode-play" class="flex-1 bg-slate-700 text-slate-400 py-2 rounded-lg font-bold hover:bg-slate-600 transition-colors">Play Mode</button>
            </div>

            <!-- Tools -->
            <div id="tools-section" class="p-4 border-b border-slate-700 bg-slate-800/50 flex gap-2">
                <button onclick="selectTool('move', null)" id="tool-move" class="tool-btn flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1">
                    <i class="ph ph-hand-grabbing text-2xl"></i> <span class="text-[0.65rem] uppercase tracking-wide">Move Tool</span>
                </button>
                <button onclick="selectTool('eraser', null)" id="tool-eraser" class="tool-btn flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1">
                    <i class="ph ph-eraser text-2xl"></i> <span class="text-[0.65rem] uppercase tracking-wide">Eraser Tool</span>
                </button>
            </div>

            <!-- Core Elements -->
            <div class="p-4 border-b border-slate-700">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Core Elements</h2>
                <div class="grid grid-cols-4 gap-2" id="palette-core">
                    <!-- Core tools injected here -->
                </div>
            </div>

            <!-- Numbers Palette -->
            <div class="p-4 border-b border-slate-700">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Number Tiles</h2>
                <div class="grid grid-cols-4 gap-2" id="palette-numbers">
                    <!-- Number buttons injected here -->
                </div>
            </div>

            <!-- Primary Life Lines -->
            <div class="p-4 border-b border-slate-700">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Primary Life Lines</h2>
                <div class="grid grid-cols-3 gap-2" id="palette-primary">
                    <!-- Primary tools injected here -->
                </div>
            </div>

            <!-- Secondary Life Lines -->
            <div class="p-4 border-b border-slate-700">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Secondary Life Lines</h2>
                <div class="grid grid-cols-2 gap-2" id="palette-secondary">
                    <!-- Secondary tools injected here -->
                </div>
            </div>

            <!-- Tertiary Life Lines -->
            <div class="p-4 mb-8">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Tertiary Life Lines</h2>
                <div class="grid grid-cols-2 gap-2" id="palette-tertiary">
                    <!-- Tertiary tools injected here -->
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- Configuration & Data ---
        const numberTiles = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072, 262144, 524288, 1048576, 2097152, 4194304, 8388608, 16777216];
        
        const coreTiles = [
            { id: 'game_over', name: 'Game Over', icon: 'ph-skull', color: 'bg-zinc-950 text-red-500 border-red-800 shadow-[inset_0_0_15px_rgba(220,38,38,0.5)]' },
            { id: 'play_button', name: 'Play', icon: 'ph-play-circle', color: 'bg-emerald-500 text-white border-emerald-600 shadow-[inset_0_0_15px_rgba(16,185,129,0.3)]' },
            { id: 'entrance', name: 'Entrance', icon: 'ph-door-open', color: 'bg-amber-600 text-white border-amber-700 shadow-[inset_0_0_15px_rgba(217,119,6,0.3)]' },
            { id: 'ad_break', name: 'Ad Break', icon: 'ph-monitor-play', color: 'bg-sky-500 text-white border-sky-600 shadow-[inset_0_0_15px_rgba(14,165,233,0.3)]' }
        ];

        const primaryTiles = [
            { id: 'bomb', name: 'Bombo', icon: 'ph-bomb', color: 'bg-rose-500 text-white border-rose-400' },
            { id: 'swap', name: 'Swap', icon: 'ph-arrows-left-right', color: 'bg-rose-600 text-white border-rose-500' },
            { id: 'hammer', name: 'Hammer', icon: 'ph-hammer', color: 'bg-rose-700 text-white border-rose-600' }
        ];

        const secondaryTiles = [
            { id: 'expire_game', name: 'Expire', icon: 'ph-hourglass-high', color: 'bg-indigo-600 text-white border-indigo-500' },
            { id: 'remove_ads', name: 'No Ads', icon: 'ph-prohibit', color: 'bg-indigo-700 text-white border-indigo-600' }
        ];

        const tertiaryTiles = [
            { id: 'lucky_wheel', name: 'Wheel', icon: 'ph-aperture', color: 'bg-teal-500 text-white border-teal-400' },
            { id: 'extra_dart', name: 'Extra Dart', icon: 'ph-crosshair', color: 'bg-teal-600 text-white border-teal-500' }
        ];

        // --- State ---
        let gridCols = 6;
        let gridRows = 8;
        let gridData = [];
        let activeTool = { category: 'number', value: 2 }; // Default tool
        let isDragging = false;
        let a4RatioLocked = false;
        let moveSelection = null; // Used for Move Tool {r, c}
        let pendingSwapFirstCell = null; // Used for Swap Lifeline in Play Mode
        let currentMode = 'build'; // 'build' or 'play'
        let savedBuildState = null;
        let entranceAudio = new Audio(); // Audio instance
        const A4_RATIO = 1.4142;

        // --- Initialization ---
        function init() {
            renderPalettes();
            
            // Check if level is loaded from share link
            const urlParams = new URLSearchParams(window.location.search);
            const levelData = urlParams.get('level');
            
            if (levelData) {
                try {
                    const parsed = JSON.parse(atob(levelData));
                    gridCols = parsed.c;
                    gridRows = parsed.r;
                    gridData = parsed.d;
                    document.getElementById('cols').value = gridCols;
                    document.getElementById('rows').value = gridRows;
                    renderGrid();
                    showMessage("Shared Level Loaded Successfully!");
                } catch (e) {
                    console.error("Invalid level data in URL", e);
                    generateGrid();
                }
            } else {
                generateGrid();
            }

            selectTool('number', 2);
            
            // Handle global drag release mechanics
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('touchend', () => isDragging = false);
        }

        // --- Audio Setup ---
        function submitAudio() {
            const urlInput = document.getElementById('audio-url').value;
            const fileInput = document.getElementById('audio-upload').files[0];

            if (fileInput) {
                const url = URL.createObjectURL(fileInput);
                entranceAudio.src = url;
                entranceAudio.load(); // Force the browser to ready the audio
                showMessage("Entrance song loaded from file!");
                
                // Optional: clear URL input if a file was selected
                document.getElementById('audio-url').value = ''; 
            } else if (urlInput) {
                entranceAudio.src = urlInput;
                entranceAudio.load(); // Force the browser to ready the audio
                showMessage("Entrance song loaded from URL!");
                
                // Optional: clear file input if a URL was provided
                document.getElementById('audio-upload').value = '';
            } else {
                showMessage("Please provide a URL or upload a file first.");
            }
        }

        function playEntranceSong() {
            if (entranceAudio.src) {
                entranceAudio.currentTime = 0;
                entranceAudio.play().then(() => {
                    showMessage("Playing Entrance Song...");
                }).catch(err => {
                    showMessage("Unable to play audio. Try a different URL/file.");
                    console.log('Audio play failed:', err);
                });
            } else {
                showMessage("No song linked! Please submit a URL or file first.");
            }
        }

        // --- Core Functions ---
        function setMode(mode) {
            currentMode = mode;
            
            const btnBuild = document.getElementById('mode-build');
            const btnPlay = document.getElementById('mode-play');
            const toolsSection = document.getElementById('tools-section');
            
            if (mode === 'build') {
                btnBuild.className = 'flex-1 bg-cyan-600 text-white py-2 rounded-lg font-bold shadow-[inset_0_0_10px_rgba(255,255,255,0.2)] transition-colors';
                btnPlay.className = 'flex-1 bg-slate-700 text-slate-400 py-2 rounded-lg font-bold hover:bg-slate-600 transition-colors';
                toolsSection.style.display = 'flex';
                
                // Show default core elements in palette again
                document.getElementById('tool-core-game_over').style.display = 'flex';
                document.getElementById('tool-core-play_button').style.display = 'flex';
                
                // Restore build state if it exists
                if (savedBuildState) {
                    gridCols = savedBuildState.cols;
                    gridRows = savedBuildState.rows;
                    gridData = savedBuildState.data;
                    document.getElementById('cols').value = gridCols;
                    document.getElementById('rows').value = gridRows;
                    savedBuildState = null;
                }
                renderGrid();
            } else {
                btnPlay.className = 'flex-1 bg-emerald-600 text-white py-2 rounded-lg font-bold shadow-[inset_0_0_10px_rgba(255,255,255,0.2)] transition-colors';
                btnBuild.className = 'flex-1 bg-slate-700 text-slate-400 py-2 rounded-lg font-bold hover:bg-slate-600 transition-colors';
                toolsSection.style.display = 'none';
                
                // Hide default core elements from palette (to prevent placing Game Over / Play)
                // But leave Entrance & Ad Break visible!
                document.getElementById('tool-core-game_over').style.display = 'none';
                document.getElementById('tool-core-play_button').style.display = 'none';
                
                // Save current build state
                savedBuildState = {
                    cols: gridCols,
                    rows: gridRows,
                    data: JSON.parse(JSON.stringify(gridData))
                };
                
                // Setup Play Mode grid (Empty 5x5)
                gridCols = 5;
                gridRows = 5;
                document.getElementById('cols').value = 5;
                document.getElementById('rows').value = 5;
                gridData = Array(5).fill(null).map(() => Array(5).fill(null));
                
                // Switch to a safe tool if moving or erasing
                if(activeTool.category === 'move' || activeTool.category === 'eraser' || activeTool.value === 'game_over' || activeTool.value === 'play_button') {
                    selectTool('number', 2);
                }
                moveSelection = null;
                pendingSwapFirstCell = null;
                renderGrid();
            }
        }

        function toggleRatioLock() {
            a4RatioLocked = !a4RatioLocked;
            const icon = document.getElementById('ratio-lock-icon');
            
            if (a4RatioLocked) {
                icon.className = 'ph ph-lock-key text-xl text-cyan-400';
                handleDimensionChange('cols'); // enforce immediately
            } else {
                icon.className = 'ph ph-lock-key-open text-xl';
            }
        }

        function handleDimensionChange(source) {
            if (!a4RatioLocked) return;
            
            let c = parseInt(document.getElementById('cols').value) || 4;
            let r = parseInt(document.getElementById('rows').value) || 4;
            
            if (source === 'cols') {
                r = Math.round(c * A4_RATIO);
                document.getElementById('rows').value = r;
            } else if (source === 'rows') {
                c = Math.round(r / A4_RATIO);
                document.getElementById('cols').value = c;
            }
        }

        function placeDefaultCoreElements() {
            if (currentMode === 'play') return; // Do not place core elements in Play Mode
            
            const r = Math.floor(gridRows / 2);
            const c = Math.floor(gridCols / 2);
            
            // Place Game Over in center
            gridData[r][c] = { category: 'core', value: 'game_over' };
            
            // Place Play Button above (or below if at top edge)
            if (r > 0) gridData[r-1][c] = { category: 'core', value: 'play_button' };
            else gridData[r+1][c] = { category: 'core', value: 'play_button' };

            // Place Entrance to the left (or right if at left edge)
            if (c > 0) gridData[r][c-1] = { category: 'core', value: 'entrance' };
            else gridData[r][c+1] = { category: 'core', value: 'entrance' };

            // Place Ad Break to the right (ensuring we don't overwrite others)
            if (c < gridCols - 1 && !gridData[r][c+1]) gridData[r][c+1] = { category: 'core', value: 'ad_break' };
            else if (c > 1 && !gridData[r][c-2]) gridData[r][c-2] = { category: 'core', value: 'ad_break' };
            else if (r < gridRows - 1 && !gridData[r+1][c]) gridData[r+1][c] = { category: 'core', value: 'ad_break' };
        }

        function generateGrid() {
            gridCols = parseInt(document.getElementById('cols').value) || 6;
            gridRows = parseInt(document.getElementById('rows').value) || 8;
            
            // Constrain
            if (gridCols < 4) gridCols = 4; if (gridCols > 15) gridCols = 15;
            if (gridRows < 4) gridRows = 4; if (gridRows > 22) gridRows = 22;
            
            document.getElementById('cols').value = gridCols;
            document.getElementById('rows').value = gridRows;

            gridData = Array(gridRows).fill(null).map(() => Array(gridCols).fill(null));
            placeDefaultCoreElements();
            moveSelection = null;
            pendingSwapFirstCell = null;
            renderGrid();
        }

        function clearGrid() {
            const msg = currentMode === 'play' 
                ? "Are you sure you want to clear the entire grid?" 
                : "Are you sure you want to clear the entire grid? (Core elements will remain)";
                
            if(confirm(msg)) {
                gridData = Array(gridRows).fill(null).map(() => Array(gridCols).fill(null));
                placeDefaultCoreElements();
                moveSelection = null;
                pendingSwapFirstCell = null;
                renderGrid();
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            // Set dynamic grid layout based on columns
            container.style.gridTemplateColumns = `repeat(${gridCols}, minmax(0, 1fr))`;
            
            // Determine a responsive cell size class based on grid dimensions to prevent overflow
            let cellSizeClass = "w-12 h-12 sm:w-14 sm:h-14 lg:w-16 lg:h-16 text-xl";
            if (gridCols > 8 || gridRows > 10) cellSizeClass = "w-10 h-10 sm:w-12 sm:h-12 text-sm";
            if (gridCols > 12) cellSizeClass = "w-8 h-8 sm:w-10 sm:h-10 text-xs";

            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-lg cursor-pointer flex items-center justify-center font-bold border-2 transition-colors duration-150 select-none ${cellSizeClass} shadow-inner`;
                    
                    const cellData = gridData[r][c];
                    
                    if (!cellData) {
                        cell.classList.add('bg-slate-700', 'border-slate-600', 'hover:bg-slate-600');
                    } else {
                        applyCellVisuals(cell, cellData);
                    }

                    // Highlight for Move Selection
                    if (moveSelection && moveSelection.r === r && moveSelection.c === c) {
                        cell.classList.add('ring-4', 'ring-yellow-400', 'scale-90', 'opacity-80', 'z-10');
                    }

                    // Highlight for Swap Selection (Play Mode)
                    if (pendingSwapFirstCell && pendingSwapFirstCell.r === r && pendingSwapFirstCell.c === c) {
                        cell.classList.add('ring-4', 'ring-rose-500', 'scale-90', 'opacity-80', 'z-10');
                    }

                    // Painting Events
                    cell.addEventListener('mousedown', (e) => {
                        e.preventDefault(); 
                        if (activeTool.category === 'move' || currentMode === 'play') {
                            paintCell(r, c); // Direct click handles move and single-drops in play mode
                        } else {
                            isDragging = true;
                            paintCell(r, c);
                        }
                    });
                    
                    cell.addEventListener('mouseenter', () => {
                        if (isDragging && activeTool.category !== 'move' && currentMode === 'build') paintCell(r, c);
                    });
                    
                    // Touch events for mobile
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (activeTool.category === 'move' || currentMode === 'play') {
                            paintCell(r, c);
                        } else {
                            isDragging = true;
                            paintCell(r, c);
                        }
                    });
                    
                    cell.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        if (!isDragging || activeTool.category === 'move' || currentMode === 'play') return;
                        
                        const touch = e.touches[0];
                        const target = document.elementFromPoint(touch.clientX, touch.clientY);
                        if (target && target.classList.contains('grid-cell')) {
                            const index = Array.from(container.children).indexOf(target);
                            if (index !== -1) {
                                const tr = Math.floor(index / gridCols);
                                const tc = index % gridCols;
                                paintCell(tr, tc);
                            }
                        }
                    });

                    container.appendChild(cell);
                }
            }
        }

        function paintCell(r, c) {
            // Handle Play Mode Logic
            if (currentMode === 'play') {
                const currentCell = gridData[r][c];
                
                // Prevent altering core elements during play
                if (currentCell && currentCell.category === 'core' && currentCell.value !== 'entrance') return;

                // Handle clicking an Entrance tile that is already on the board
                if (currentCell && currentCell.value === 'entrance') {
                    playEntranceSong();
                    return; // Prevent overwrite
                }

                if (activeTool.category === 'number') {
                    if (!currentCell) {
                        // Place new block
                        gridData[r][c] = { category: 'number', value: activeTool.value };
                    } else if (currentCell.category === 'number' && currentCell.value === activeTool.value) {
                        // Merge blocks to next level
                        const currentIndex = numberTiles.indexOf(currentCell.value);
                        if (currentIndex !== -1 && currentIndex < numberTiles.length - 1) {
                            gridData[r][c] = { category: 'number', value: numberTiles[currentIndex + 1] };
                        }
                    } else {
                        // Mismatch, block placement (do nothing)
                        return;
                    }
                } else if (activeTool.value === 'entrance') {
                    // Play song immediately when placed
                    playEntranceSong();
                    gridData[r][c] = { category: 'core', value: 'entrance' };
                } else if (activeTool.category === 'primary') {
                    if (activeTool.value === 'bomb') {
                        // Delete everything in the column (except core elements)
                        for (let i = 0; i < gridRows; i++) {
                            if (gridData[i][c] && gridData[i][c].category === 'core') continue;
                            gridData[i][c] = null;
                        }
                    } else if (activeTool.value === 'hammer') {
                        if (currentCell && currentCell.category !== 'core') {
                            gridData[r][c] = null; // Destructive single tool
                        }
                    } else if (activeTool.value === 'swap') {
                        if (!pendingSwapFirstCell) {
                            if (currentCell && currentCell.category === 'core') return;
                            pendingSwapFirstCell = {r, c};
                        } else {
                            if (pendingSwapFirstCell.r === r && pendingSwapFirstCell.c === c) {
                                pendingSwapFirstCell = null; // Deselect
                            } else {
                                if (currentCell && currentCell.category === 'core') return; // Don't swap core
                                const temp = gridData[r][c];
                                gridData[r][c] = gridData[pendingSwapFirstCell.r][pendingSwapFirstCell.c];
                                gridData[pendingSwapFirstCell.r][pendingSwapFirstCell.c] = temp;
                                pendingSwapFirstCell = null;
                            }
                        }
                    }
                } else {
                    gridData[r][c] = { category: activeTool.category, value: activeTool.value };
                }
                renderGrid();
                return;
            }

            // Handle Move Tool Interactions (Swapping in Build Mode)
            if (activeTool.category === 'move') {
                if (!moveSelection) {
                    // Start selection if clicking a populated cell
                    if (gridData[r][c]) {
                        moveSelection = {r, c};
                        renderGrid();
                    }
                } else {
                    // Deselect if clicking same cell
                    if (moveSelection.r === r && moveSelection.c === c) {
                        moveSelection = null;
                        renderGrid();
                        return;
                    }
                    // Execute Swap
                    const temp = gridData[r][c];
                    gridData[r][c] = gridData[moveSelection.r][moveSelection.c];
                    gridData[moveSelection.r][moveSelection.c] = temp;
                    moveSelection = null;
                    renderGrid();
                }
                return; // Stop standard painting
            }

            const currentCell = gridData[r][c];

            // Protect minimum of 1 for Core Elements from Eraser/Overwrite
            if (currentCell && currentCell.category === 'core') {
                const targetType = currentCell.value;
                let typeCount = 0;
                
                for (let i = 0; i < gridRows; i++) {
                    for (let j = 0; j < gridCols; j++) {
                        if (gridData[i][j] && gridData[i][j].value === targetType) typeCount++;
                    }
                }
                
                // If replacing it and it's the last one, block action
                if (typeCount <= 1 && activeTool.value !== targetType) return;
            }

            // Apply selected tool
            if (activeTool.category === 'eraser') {
                gridData[r][c] = null;
            } else {
                gridData[r][c] = { category: activeTool.category, value: activeTool.value };
            }
            renderGrid();
        }

        // --- Visual Mapping ---
        function getNumberColors(val) {
            const colors = {
                2: 'bg-[#eee4da] text-[#776e65] border-[#dacaba]',
                4: 'bg-[#ede0c8] text-[#776e65] border-[#e0cba8]',
                8: 'bg-[#f2b179] text-white border-[#e6985b]',
                16: 'bg-[#f59563] text-white border-[#df7a47]',
                32: 'bg-[#f67c5f] text-white border-[#de6042]',
                64: 'bg-[#f65e3b] text-white border-[#df4320]',
                128: 'bg-[#edcf72] text-white border-[#ddbd53]',
                256: 'bg-[#edcc61] text-white border-[#ddb945]',
                512: 'bg-[#edc850] text-white border-[#dcb638]',
                1024: 'bg-[#edc53f] text-white border-[#dcb028]',
                2048: 'bg-[#edc22e] text-white border-[#d9ab18]',
                4096: 'bg-[#3c3a32] text-[#f9f6f2] border-[#201f1b]',
                8192: 'bg-[#3c3a32] text-[#f9f6f2] border-[#201f1b]',
                16384: 'bg-[#3c3a32] text-[#f9f6f2] border-[#201f1b]',
                32768: 'bg-[#3c3a32] text-[#f9f6f2] border-[#201f1b]',
                65536: 'bg-[#3c3a32] text-[#f9f6f2] border-[#201f1b]',
                131072: 'bg-indigo-600 text-white border-indigo-800',
                262144: 'bg-indigo-700 text-white border-indigo-900',
                524288: 'bg-violet-600 text-white border-violet-800',
                1048576: 'bg-violet-700 text-white border-violet-900',
                2097152: 'bg-purple-600 text-white border-purple-800',
                4194304: 'bg-purple-700 text-white border-purple-900',
                8388608: 'bg-fuchsia-600 text-white border-fuchsia-800',
                16777216: 'bg-fuchsia-700 text-white border-fuchsia-900'
            };
            return colors[val] || 'bg-gray-800 text-white border-gray-900';
        }

        function getSpecialTileData(category, id) {
            if (category === 'core') return coreTiles.find(t => t.id === id);
            if (category === 'primary') return primaryTiles.find(t => t.id === id);
            if (category === 'secondary') return secondaryTiles.find(t => t.id === id);
            if (category === 'tertiary') return tertiaryTiles.find(t => t.id === id);
            return null;
        }

        function applyCellVisuals(element, data) {
            if (data.category === 'number') {
                element.className += ' ' + getNumberColors(data.value);
                if(data.value >= 1000000) {
                    element.innerHTML = `<span class="text-[0.45em]">${data.value}</span>`;
                } else if(data.value >= 100000) {
                    element.innerHTML = `<span class="text-[0.55em]">${data.value}</span>`;
                } else if(data.value > 1000) {
                    element.innerHTML = `<span class="text-[0.65em]">${data.value}</span>`;
                } else {
                    element.innerHTML = `<span>${data.value}</span>`;
                }
            } else {
                const specData = getSpecialTileData(data.category, data.value);
                if (specData) {
                    element.className += ' ' + specData.color;
                    element.innerHTML = `<i class="ph ${specData.icon} text-2xl"></i>`;
                }
            }
        }

        // --- Palettes & Tools ---
        function selectTool(category, value) {
            activeTool = { category, value };
            
            // If changing tools, drop move & swap selections
            moveSelection = null;
            pendingSwapFirstCell = null;
            if (gridData.length > 0) renderGrid();

            // UI Update for active tool
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-cyan-400', 'scale-110', 'active');
            });
            
            const btnId = category === 'eraser' || category === 'move' ? `tool-${category}` : `tool-${category}-${value}`;
            const activeBtn = document.getElementById(btnId);
            if(activeBtn) {
                activeBtn.classList.add('ring-4', 'ring-cyan-400', 'scale-110', 'active');
            }
        }

        function renderPalettes() {
            // Numbers
            const numContainer = document.getElementById('palette-numbers');
            numberTiles.forEach(num => {
                const btn = document.createElement('button');
                btn.id = `tool-number-${num}`;
                btn.className = `tool-btn aspect-square rounded-xl font-bold text-sm sm:text-base border-2 shadow flex items-center justify-center ${getNumberColors(num)}`;
                
                if(num >= 1000000) btn.innerHTML = `<span class="text-[0.45em] sm:text-[0.5em]">${num}</span>`;
                else if(num >= 100000) btn.innerHTML = `<span class="text-[0.55em] sm:text-[0.6em]">${num}</span>`;
                else if(num > 1000) btn.innerHTML = `<span class="text-xs sm:text-sm">${num}</span>`;
                else btn.textContent = num;

                btn.onclick = () => selectTool('number', num);
                numContainer.appendChild(btn);
            });

            // Special Tools Renderer
            const renderSpecial = (items, containerId, category) => {
                const container = document.getElementById(containerId);
                items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.id = `tool-${category}-${item.id}`;
                    btn.className = `tool-btn aspect-square rounded-xl flex flex-col items-center justify-center gap-1 border-2 shadow p-1 ${item.color}`;
                    btn.innerHTML = `
                        <i class="ph ${item.icon} text-xl lg:text-2xl"></i>
                        <span class="text-[0.55rem] lg:text-[0.6rem] font-bold leading-tight uppercase text-center">${item.name}</span>
                    `;
                    btn.onclick = () => selectTool(category, item.id);
                    container.appendChild(btn);
                });
            }

            renderSpecial(coreTiles, 'palette-core', 'core');
            renderSpecial(primaryTiles, 'palette-primary', 'primary');
            renderSpecial(secondaryTiles, 'palette-secondary', 'secondary');
            renderSpecial(tertiaryTiles, 'palette-tertiary', 'tertiary');
        }

        // --- Export Feature ---
        let toastTimeout;
        function showMessage(msg) {
            const el = document.getElementById('toast-message');
            const text = document.getElementById('toast-text');
            text.textContent = msg;
            
            el.classList.remove('opacity-0', 'translate-y-[-20px]');
            el.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                el.classList.remove('opacity-100', 'translate-y-0');
                el.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3000);
        }

        function exportImage() {
            const captureArea = document.getElementById('capture-area');
            
            // Briefly remove selection highlight for the snapshot
            const tempSel = moveSelection;
            const tempSwap = pendingSwapFirstCell;
            moveSelection = null;
            pendingSwapFirstCell = null;
            renderGrid();

            showMessage("Generating image...");

            html2canvas(captureArea, {
                backgroundColor: '#0f172a', // match app bg
                scale: 2 // render at higher resolution
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                document.getElementById('exported-image').src = imgData;
                
                // Show modal overlay
                document.getElementById('image-modal').classList.remove('hidden');
                document.getElementById('image-modal').classList.add('flex');
                showMessage("Image ready to save!");
                
                // Restore selection if there was one
                moveSelection = tempSel;
                pendingSwapFirstCell = tempSwap;
                renderGrid();
            }).catch(err => {
                showMessage("Failed to generate image.");
                console.error(err);
            });
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.remove('flex');
            document.getElementById('image-modal').classList.add('hidden');
        }

        function copyShareLink() {
            // Encode critical data only to keep link short
            const minimalData = { c: gridCols, r: gridRows, d: gridData };
            const encoded = btoa(JSON.stringify(minimalData));
            const url = window.location.origin + window.location.pathname + '?level=' + encoded;
            
            navigator.clipboard.writeText(url).then(() => {
                showMessage("Share Link copied to clipboard!");
            }).catch(() => {
                // Fallback if clipboard API fails
                const box = document.getElementById('fallback-box');
                box.value = url;
                box.classList.remove('hidden');
                box.select();
                document.execCommand('copy');
                showMessage("Share link generated in text box below.");
            });
        }

        // Run
        window.onload = init;
    </script>
</body>
</html>
